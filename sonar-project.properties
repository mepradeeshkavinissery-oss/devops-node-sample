# ---- SonarQube project configuration ----
# The SonarQube scanner reads this file automatically.

# Unique key for the project inside your SonarQube server
sonar.projectKey=devops-node-sample
sonar.projectName=DevOps Node Sample
sonar.projectVersion=1.0

# Where the source and test code live
sonar.sources=src
sonar.tests=test

# Language / analysis settings
sonar.sourceEncoding=UTF-8

# Feed Jest's coverage report to SonarQube (generated by "npm test")
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude noise from analysis
sonar.exclusions=node_modules/**,coverage/**,**/*.test.js

# NOTE: sonar.host.url and sonar.login (token) are passed from the
# GitHub Actions workflow using secrets, NOT hard-coded here.
