name: CI-CD Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "Which environment to deploy to"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build · Test · Scan · Publish
    runs-on:
      - self-hosted
      - linux

    outputs:
      artifact_name: ${{ steps.pack.outputs.artifact_name }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Package application
        id: pack
        run: |
          VERSION="${{ github.run_number }}-$(echo ${{ github.sha }} | cut -c1-7)"
          ARTIFACT="devops-node-sample-${VERSION}.tgz"

          tar -czf "$ARTIFACT" \
            package.json \
            package-lock.json \
            src \
            scripts/start-app.sh

          echo "artifact_name=$ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"

      - name: Publish artifact to Nexus
        run: |
          curl --fail \
            -u "${{ secrets.NEXUS_USERNAME }}:${{ secrets.NEXUS_PASSWORD }}" \
            --upload-file "$ARTIFACT" \
            "${{ secrets.NEXUS_URL }}/repository/node-artifacts/$ARTIFACT"

      - name: Upload artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: ${{ env.ARTIFACT }}

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on:
      - self-hosted
      - linux

    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-package

      - name: Show deployment info
        run: |
          echo "Environment: ${{ github.event.inputs.environment || 'dev' }}"
          echo "Artifact: ${{ needs.build.outputs.artifact_name }}"

      - name: Select target host
        id: target
        run: |
          if [ "${{ github.event.inputs.environment }}" = "prod" ]; then
            echo "host=${{ secrets.EC2_HOST_PROD }}" >> "$GITHUB_OUTPUT"
          else
            echo "host=${{ secrets.EC2_HOST_DEV }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          SSH_USER: ${{ secrets.EC2_USER }}
          HOST: ${{ steps.target.outputs.host }}
          ARTIFACT: ${{ needs.build.outputs.artifact_name }}
          APP_ENV: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          echo "$SSH_KEY" > deploy_key.pem
          chmod 600 deploy_key.pem

          scp -o StrictHostKeyChecking=no \
              -i deploy_key.pem \
              "$ARTIFACT" \
              "$SSH_USER@$HOST:/tmp/$ARTIFACT"

          scp -o StrictHostKeyChecking=no \
              -i deploy_key.pem \
              scripts/deploy-remote.sh \
              "$SSH_USER@$HOST:/tmp/deploy-remote.sh"

          ssh -o StrictHostKeyChecking=no \
              -i deploy_key.pem \
              "$SSH_USER@$HOST" \
              "APP_ENV=$APP_ENV ARTIFACT=$ARTIFACT bash /tmp/deploy-remote.sh"

          rm -f deploy_key.pem

      - name: Smoke test
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          SSH_USER: ${{ secrets.EC2_USER }}
          HOST: ${{ steps.target.outputs.host }}
        run: |
          echo "$SSH_KEY" > deploy_key.pem
          chmod 600 deploy_key.pem

          ssh -o StrictHostKeyChecking=no \
              -i deploy_key.pem \
              "$SSH_USER@$HOST" \
              "curl -f http://localhost:3000/health"

          rm -f deploy_key.pem
